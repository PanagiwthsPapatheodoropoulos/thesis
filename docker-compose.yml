version: '3.8'

services:
  postgres_db:
    image: postgres:16-alpine
    container_name: resource_allocation_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis_cache:
    image: redis:7-alpine
    container_name: resource_allocation_redis
    restart: always
    command: redis-server --requirepass ${SPRING_REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${SPRING_REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: ollama_service
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - app_network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      #interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  ollama_init:
    image: ollama/ollama:latest
    container_name: ollama_init
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - app_network
    restart: "no"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: /bin/sh
    command: >
      -c "
      echo 'Waiting for Ollama service to be ready...';
      sleep 5;
      
      echo 'Checking if Phi-3 model exists...';
      if ollama list | grep -q 'phi3'; then
        echo 'Phi-3 model already exists';
      else
        echo 'Downloading Phi-3 model (2.2GB - this will take 2-5 minutes)...';
        ollama pull phi3:latest;
        
        if [ $? -eq 0 ]; then
          echo 'Phi-3 model downloaded successfully';
        else
          echo 'Failed to download Phi-3 model';
          exit 1;
        fi;
      fi;
      
      echo 'Verifying model is accessible...';
      ollama list;
      echo 'Ollama initialization complete!';
      "
    environment:
      - OLLAMA_HOST=http://ollama_service:11434

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    container_name: resource_allocation_backend
    restart: always
    environment:
      ADMIN_KEY_SECRET: ${ADMIN_KEY_SECRET}
      MANAGER_KEY_SECRET: ${MANAGER_KEY_SECRET}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SPRING_DATASOURCE_URL: ${DB_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      SPRING_REDIS_PASSWORD: ${SPRING_REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
      AI_SERVICE_URL: http://ai_service:5000
      SERVER_PORT: 8080
    ports:
      - "${BACKEND_PORT}:8080"
    depends_on:
      postgres_db:
        condition: service_healthy
      redis_cache:
        condition: service_healthy
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_WS_URL: ${VITE_WS_URL}
    container_name: resource_allocation_frontend
    restart: always
    environment:
      NODE_ENV: production
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3

  ai_service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile.ai
    container_name: ai_service
    restart: always
    environment:
      BACKEND_API_URL: ${BACKEND_API_URL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_DB: ${REDIS_DB}
      SPRING_REDIS_PASSWORD: ${SPRING_REDIS_PASSWORD}
      CACHE_TTL_SHORT: ${CACHE_TTL_SHORT}
      CACHE_TTL_MEDIUM: ${CACHE_TTL_MEDIUM}
      CACHE_TTL_LONG: ${CACHE_TTL_LONG}
      MODEL_CACHE_DIR: ${MODEL_CACHE_DIR}
      GENETIC_ALGORITHM_POPULATION: ${GENETIC_ALGORITHM_POPULATION}
      GENETIC_ALGORITHM_GENERATIONS: ${GENETIC_ALGORITHM_GENERATIONS}
      GENETIC_ALGORITHM_MUTATION_RATE: ${GENETIC_ALGORITHM_MUTATION_RATE}
      LOG_LEVEL: ${LOG_LEVEL}
      OLLAMA_HOST: http://ollama_service:11434
    volumes:
      - ai_models:/app/models
      - ai_logs:/app/logs
    ports:
      - "${AI_SERVICE_PORT}:5000"
    depends_on:
      redis_cache:
        condition: service_healthy
      backend:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ollama_init:
        condition: service_completed_successfully
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  db_data:
  redis_data:
  ai_models:
  ai_logs:
  ollama_data:

networks:
  app_network:
    driver: bridge