spring.application.name=smart-resource-planner
spring.profiles.active=dev

# Redis Configuration
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${SPRING_REDIS_PASSWORD}
spring.data.redis.timeout=5000ms

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Silence PageImpl JSON shape warning without changing response payloads
logging.level.org.springframework.data.web.config.SpringDataJacksonConfiguration$PageModule$WarningLoggingModifier=ERROR

#AI Service Configuration
ai.service.url=http://localhost:8000
ai.service.enabled=true

# --- FLYWAY CONFIGURATION ---
spring.flyway.enabled=true
# Automatically run migrations on startup
spring.flyway.baseline-on-migrate=true
# If you have existing data, this sets the baseline version
spring.flyway.baseline-version=0
# Location of migration files
spring.flyway.locations=classpath:db/migration
# Validate that the scripts haven't changed since they were run
spring.flyway.validate-on-migrate=true

# --- ACTUATOR / MONITORING ---
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized
management.endpoint.health.show-components=when_authorized
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# --- STRUCTURED LOGGING ---
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

# --- CONNECTION POOL ---
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# --- OPENAPI / SWAGGER ---
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# --- MULTIPART UPLOADS ---
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB