spring.application.name=smart-resource-planner
spring.profiles.active=dev

# Redis Configuration
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${SPRING_REDIS_PASSWORD}
spring.data.redis.timeout=5000ms

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

#AI Service Configuration
ai.service.url=http://localhost:8000
ai.service.enabled=true

# --- FLYWAY CONFIGURATION ---
spring.flyway.enabled=true
# Automatically run migrations on startup
spring.flyway.baseline-on-migrate=true
# If you have existing data, this sets the baseline version
spring.flyway.baseline-version=0
# Location of migration files
spring.flyway.locations=classpath:db/migration
# Validate that the scripts haven't changed since they were run
spring.flyway.validate-on-migrate=true