spring.application.name=smart-resource-planner

# -----------------------------
# In-memory DB for tests (H2)
# -----------------------------
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
# Avoid ordinal enums -> tinyint DDL issues on H2/Postgres-mode
spring.jpa.properties.hibernate.type.preferred_enum_jdbc_type=VARCHAR

# Do not run Postgres-specific Flyway migrations in H2 tests
spring.flyway.enabled=false

# -----------------------------
# Disable external integrations
# -----------------------------
ai.service.enabled=false
ai.service.url=http://localhost:8000

# Avoid Redis auto-config in tests
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# JWT settings required by JwtTokenProvider (@Value placeholders)
# HS512 requires a sufficiently long secret (>= 64 bytes)
JWT_SECRET=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
JWT_EXPIRATION_MS=86400000

# AuthService admin/manager keys required by @Value placeholders
ADMIN_KEY_SECRET=admin-secret
MANAGER_KEY_SECRET=manager-secret

# Stub values for placeholders referenced in main application.properties
REDIS_HOST=localhost
REDIS_PORT=6379
SPRING_REDIS_PASSWORD=

