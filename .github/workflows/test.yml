name: CI Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  # ─── Backend (Spring Boot / Maven) ─────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Run backend tests
        working-directory: backend
        env:
          # Using H2 (in-memory) defined in application-test.properties
          JWT_SECRET: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          JWT_EXPIRATION_MS: 86400000
          ADMIN_KEY_SECRET: test-admin-key
          MANAGER_KEY_SECRET: test-manager-key
          JWT_REFRESH_EXPIRATION_MS: 604800000
          BREVO_API_KEY: ""
          BREVO_SENDER_EMAIL: noreply@test.com
          BREVO_SENDER_NAME: "Test"
          AI_SERVICE_URL: http://localhost:5000
          SPRING_PROFILES_ACTIVE: test
        run: mvn --batch-mode --no-transfer-progress test

      - name: Upload backend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/target/surefire-reports/

  # ─── Frontend (Vite / Vitest) ───────────────────────────────────────────────
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend type-check
        working-directory: frontend
        run: npx tsc --noEmit || true

      - name: Run frontend tests
        working-directory: frontend
        run: npm test --if-present || echo "No test script defined – skipping"

  # ─── AI Service (Python / pytest) ──────────────────────────────────────────
  ai-service-tests:
    name: AI Service Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('ai_service/requirements*.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install AI service dependencies
        working-directory: ai_service
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-test.txt ]; then pip install -r requirements-test.txt; fi
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run AI service tests
        working-directory: ai_service
        env:
          BACKEND_API_URL: http://localhost:8080/api
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          SPRING_REDIS_PASSWORD: ""
          LOG_LEVEL: WARNING
          OLLAMA_HOST: http://localhost:11434
        run: |
          if [ -d tests ]; then
            python -m pytest tests/ -v --tb=short || true
          else
            echo "No tests directory found in ai_service – skipping"
          fi
